name: Feature request
description: Propose a focused improvement to InferenceMeter
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful outcome, not only an implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Project fit
      options:
        - label: This preserves InferenceMeter's read-only credential model.
          required: true
        - label: I searched for an existing request.
          required: true
